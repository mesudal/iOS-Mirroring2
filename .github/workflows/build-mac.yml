name: Build macOS DMG

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller create-dmg
        pip install -r requirements.txt

    - name: Install brew dependencies (ffmpeg, uxplay)
      run: |
        brew update
        brew install ffmpeg uxplay

    - name: Build with PyInstaller
      run: |
        # Use existing icon.icns if available, otherwise just build
        if [ -f "icon.icns" ]; then
          pyinstaller --noconfirm --windowed --name "iOSMirroring" --icon=icon.icns ios_mirror_capture.py
        else
          pyinstaller --noconfirm --windowed --name "iOSMirroring" ios_mirror_capture.py
        fi
        
    - name: Create DMG
      run: |
        mkdir -p dist/dmg
        cp -r dist/iOSMirroring.app dist/dmg/
        create-dmg \
          --volname "iOS Mirroring" \
          --window-pos 200 120 \
          --window-size 600 400 \
          --icon-size 100 \
          --icon "iOSMirroring.app" 175 120 \
          --hide-extension "iOSMirroring.app" \
          --app-drop-link 425 120 \
          dist/iOSMirroring.dmg \
          dist/dmg/
          
    - name: Upload DMG Artifact
      uses: actions/upload-artifact@v4
      with:
        name: iOSMirroring-macOS
        path: dist/iOSMirroring.dmg
